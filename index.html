<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoojo Chat - Official</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="screen-register" class="full-screen">
        <div class="glass-card">
            <div class="zj-logo-main">ZJ</div>
            <h1>Zoojo Chat</h1>
            <p class="dev-text">Created by Faizan Izan</p>
            
            <div id="id-display-area" class="hidden">
                <p>ID Zoojo Kamu:</p>
                <h2 id="generated-id" class="cyan-text">ZJ...</h2>
            </div>

            <div id="action-btns">
                <button id="btn-create" class="btn-primary" onclick="aksiBuatID()">Buat ID Zoojo Kamu</button>
            </div>
            
            <div id="post-id-btns" class="hidden">
                <div class="btn-group">
                    <button class="btn-outline" onclick="aksiBuatID()">Buat Ulang</button>
                    <button class="btn-primary" onclick="keDashboard()">Lanjut</button>
                </div>
            </div>
        </div>
    </div>

    <div id="screen-dashboard" class="app-container hidden">
        <aside class="sidebar">
            <header class="side-header">
                <div class="mini-logo">ZJ</div>
                <div class="side-icons">
                    <i class="fas fa-plus-circle" onclick="bukaModalTambah()"></i>
                    <i class="fas fa-ellipsis-v" onclick="bukaHalamanID()"></i>
                </div>
            </header>
            <div id="contact-list" class="contact-list"></div>
        </aside>

        <main class="chat-main">
            <div id="no-chat" class="welcome-chat">
                <i class="fas fa-comments"></i>
                <h2>Selamat Datang</h2>
                <p>Pilih teman untuk mulai chat.</p>
            </div>

            <div id="chat-window" class="chat-window hidden">
                <header class="chat-header">
                    <div class="avatar-circle">ZJ</div>
                    <span id="chat-with-id">Target</span>
                </header>
                <div id="messages" class="message-container"></div>
                <div class="chat-input-bar">
                    <input type="text" id="msg-input" placeholder="Ketik pesan...">
                    <button onclick="kirimPesan()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </main>
    </div>

    <div id="screen-profile" class="full-screen hidden">
        <div class="glass-card">
            <div class="zj-logo-main">ZJ</div>
            <h1>Profil Saya</h1>
            <div class="id-info-box">
                <h2 id="my-id-display" class="cyan-text">ZJ...</h2>
            </div>
            <button class="btn-primary" onclick="kembaliKeChat()">KEMBALI</button>
        </div>
    </div>

    <div id="modal-tambah" class="modal hidden">
        <div class="modal-content">
            <h3>Tambah Teman</h3>
            <input type="text" id="input-target" placeholder="ID ZJ Teman...">
            <div class="modal-actions">
                <button class="btn-cancel" onclick="tutupModal()">Batal</button>
                <button class="btn-primary" onclick="tambahTeman()">Tambah</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
